# Communication Bus Configuration

# Message Broker Settings
message_broker:
  type: "kafka"  # kafka, rabbitmq, redis
  bootstrap_servers:
    - "localhost:9092"
  security_protocol: "PLAINTEXT"  # PLAINTEXT, SSL, SASL_PLAINTEXT, SASL_SSL
  sasl_mechanism: "PLAIN"
  sasl_username: ""
  sasl_password: ""

# Topic Configuration
topics:
  agent_communication:
    name: "agent-communication"
    partitions: 3
    replication_factor: 1
    retention_hours: 24
  system_events:
    name: "system-events"
    partitions: 3
    replication_factor: 1
    retention_hours: 168  # 7 days
  health_metrics:
    name: "health-metrics"
    partitions: 3
    replication_factor: 1
    retention_hours: 24
  task_updates:
    name: "task-updates"
    partitions: 3
    replication_factor: 1
    retention_hours: 24

# Message Format
message_format:
  version: "1.0"
  encoding: "json"
  compression: "gzip"
  max_size: 1048576  # 1MB
  required_fields:
    - "message_id"
    - "timestamp"
    - "sender"
    - "receiver"
    - "message_type"
    - "payload"

# Routing Configuration
routing:
  default_timeout: 5  # seconds
  retry_attempts: 3
  retry_delay: 1  # seconds
  dead_letter_queue: "dead-letter-queue"
  message_priority_levels:
    - "critical"
    - "high"
    - "medium"
    - "low"

# Producer Settings
producer:
  acks: "all"
  retries: 3
  batch_size: 16384
  linger_ms: 5
  buffer_memory: 33554432  # 32MB
  compression_type: "gzip"
  max_in_flight_requests: 5
  request_timeout_ms: 30000

# Consumer Settings
consumer:
  group_id: "virtual-brain-group"
  auto_offset_reset: "earliest"
  enable_auto_commit: true
  auto_commit_interval_ms: 5000
  max_poll_records: 500
  max_poll_interval_ms: 300000
  session_timeout_ms: 10000
  heartbeat_interval_ms: 3000

# Error Handling
error_handling:
  max_retries: 3
  backoff_factor: 2
  max_backoff_ms: 60000
  error_topic: "error-messages"
  alert_threshold: 100  # errors per minute

# Monitoring
monitoring:
  metrics_collection_interval: 60  # seconds
  alert_thresholds:
    message_latency_ms: 1000
    error_rate: 0.01
    queue_size: 10000
  metrics_to_collect:
    - "message_count"
    - "message_size"
    - "latency"
    - "error_count"
    - "queue_size"

# Security
security:
  ssl_enabled: false
  ssl_ca_location: ""
  ssl_certificate_location: ""
  ssl_key_location: ""
  ssl_key_password: ""
  sasl_enabled: false
  sasl_username: ""
  sasl_password: ""

# Performance Tuning
performance:
  num_network_threads: 3
  num_io_threads: 8
  background_threads: 10
  queued_max_requests: 500
  socket_send_buffer_bytes: 102400
  socket_receive_buffer_bytes: 102400
  socket_max_receive_bytes: 104857600
  connections_max_idle_ms: 540000

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - "console"
    - "file"
  log_file: "communication_bus.log"
  max_file_size: 10485760  # 10MB
  backup_count: 5 