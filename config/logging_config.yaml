# Filter Configurations
filters:
  sensitive_data:
    class: virtual_brain.utils.logging.SensitiveDataFilter
    patterns:
      - 'password'
      - 'token'
      - 'key'
      - 'secret'

# Log Rotation
rotation:
  max_bytes: 10485760  # 10MB
  backup_count: 5
  interval: 86400  # 24 hours

# Log Aggregation
aggregation:
  enabled: true
  host: localhost
  port: 5000
  protocol: tcp
  batch_size: 100
  batch_timeout: 5  # seconds

# Error Reporting
error_reporting:
  enabled: true
  service: sentry
  dsn: ""
  environment: development
  level: ERROR
  ignore_errors:
    - KeyboardInterrupt
    - SystemExit 