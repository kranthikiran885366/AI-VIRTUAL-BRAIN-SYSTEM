# Logging Configuration

# Root Logger Configuration
root:
  level: INFO
  handlers:
    - console
    - file
    - syslog
  propagate: true

# Console Handler
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: logs/virtual_brain.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

  syslog:
    class: logging.handlers.SysLogHandler
    level: WARNING
    formatter: syslog
    address: /dev/log
    facility: local0

# Formatters
formatters:
  standard:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(funcName)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  syslog:
    format: 'virtual_brain[%(process)d]: %(name)s %(levelname)s - %(message)s'

